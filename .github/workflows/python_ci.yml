name: Python Project CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: PYTHONPATH=. pytest
